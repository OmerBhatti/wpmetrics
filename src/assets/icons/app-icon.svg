<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.9">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect x="56" y="56" width="912" height="912" rx="196" fill="url(#bg)" />
  <rect x="56" y="56" width="912" height="912" rx="196" fill="url(#glow)" />

  <g filter="url(#soft-shadow)">
    <rect x="234" y="302" width="98" height="410" rx="49" fill="url(#accent)" />
    <rect x="386" y="236" width="98" height="476" rx="49" fill="url(#accent)" />
    <rect x="538" y="374" width="98" height="338" rx="49" fill="url(#accent)" />
    <rect x="690" y="192" width="98" height="520" rx="49" fill="url(#accent)" />
  </g>

  <text x="512" y="835" text-anchor="middle" fill="#dbeafe" font-family="Avenir Next, SF Pro Display, Segoe UI, sans-serif" font-size="122" font-weight="700" letter-spacing="4">
    WPM
